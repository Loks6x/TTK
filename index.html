<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Тугай ТТК">
    <title>Тугай ТТК</title>
    <style>
        /* Apple-style Typography & Reset */
        :root {
            --bg-base: #000000;
            --bg-card: rgba(28, 28, 30, 0.6);
            --bg-search: #1C1C1E;
            --accent: #0A84FF;
            --accent-pf: #30D158;
            --accent-danger: #FF453A;
            --accent-warning: #FF9F0A;
            --text-main: #FFFFFF;
            --text-sec: #EBEBF599;
            --border-color: rgba(255, 255, 255, 0.1);
            --glass-blur: blur(20px);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            margin: 0;
            padding: 20px 16px 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { font-size: 28px; font-weight: 700; letter-spacing: 0.5px; margin: 10px 0 25px; text-align: center; }

        .controls {
            width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 16px;
            margin-bottom: 24px; position: sticky; top: 0; z-index: 100;
            background: rgba(0, 0, 0, 0.8); backdrop-filter: var(--glass-blur); padding: 10px 0 15px;
        }

        .segment-control { display: flex; background: var(--bg-search); border-radius: 12px; padding: 4px; }
        .tab-btn {
            flex: 1; background: transparent; border: none; color: var(--text-sec); padding: 10px;
            border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s ease;
        }
        .tab-btn.active { background: rgba(255, 255, 255, 0.15); color: var(--text-main); box-shadow: 0 2px 8px rgba(0,0,0,0.2); }

        .search-bar {
            width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid var(--border-color);
            background: var(--bg-search); color: white; font-size: 16px; outline: none; transition: border 0.2s;
        }
        .search-bar:focus { border-color: var(--accent); }

        .filters { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
        .filters::-webkit-scrollbar { display: none; }
        .filter-pill {
            background: var(--bg-search); border: 1px solid var(--border-color); color: var(--text-sec);
            padding: 6px 14px; border-radius: 20px; font-size: 14px; font-weight: 500; white-space: nowrap; cursor: pointer; transition: 0.2s;
        }
        .filter-pill.active { background: var(--text-main); color: var(--bg-base); border-color: var(--text-main); }

        .content-container { width: 100%; max-width: 1000px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; width: 100%; }

        .card {
            background: var(--bg-card); backdrop-filter: var(--glass-blur); border: 1px solid var(--border-color);
            border-radius: 20px; padding: 20px; cursor: pointer; transition: background 0.3s, transform 0.2s;
        }
        .card:active { transform: scale(0.98); }
        .card-header { display: flex; justify-content: space-between; align-items: center; }
        .card-title { font-size: 19px; font-weight: 600; margin: 0; color: var(--text-main); line-height: 1.2; }
        .chevron { color: var(--text-sec); transition: transform 0.3s ease; font-size: 14px; }
        .card.open .chevron { transform: rotate(180deg); }
        .card-content { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.3s ease-out; }
        .card-content-inner { overflow: hidden; }
        .card.open .card-content { grid-template-rows: 1fr; margin-top: 16px; border-top: 1px solid var(--border-color); padding-top: 16px; }

        .tags { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
        .tag { background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 500; color: var(--text-sec); }
        .tag.glass { background: rgba(10, 132, 255, 0.2); color: var(--accent); }
        
        .method { font-size: 15px; line-height: 1.5; color: var(--text-main); margin-bottom: 10px; }
        ul { margin: 0 0 16px 0; padding-left: 20px; color: var(--text-main); font-size: 15px; line-height: 1.6;}
        li { margin-bottom: 4px; }

        /* Стили калькулятора ПФ */
        .pf-calculator { display: flex; align-items: center; gap: 12px; background: rgba(48, 209, 88, 0.1); border: 1px solid rgba(48, 209, 88, 0.3); border-radius: 12px; padding: 12px; margin-bottom: 16px; }
        .pf-calc-label { font-size: 14px; font-weight: 600; color: var(--accent-pf); }
        .pf-calc-input { background: rgba(0,0,0,0.5); border: 1px solid var(--border-color); color: #fff; padding: 8px; border-radius: 8px; width: 80px; font-size: 16px; font-weight: bold; text-align: center; outline: none; transition: border 0.2s; }
        .pf-calc-input:focus { border-color: var(--accent-pf); }
        .pf-calc-unit { font-size: 14px; color: var(--text-sec); }
        .ing-val { font-weight: bold; color: var(--accent-pf); transition: color 0.2s; }

        /* Стили чек-листа */
        #checklist-container { display: none; width: 100%; flex-direction: column; gap: 16px; }
        .cl-input-group { display: flex; gap: 10px; }
        .cl-input { flex: 1; padding: 14px 16px; border-radius: 12px; border: 1px solid var(--border-color); background: var(--bg-search); color: white; font-size: 16px; outline: none; }
        .cl-input:focus { border-color: var(--accent); }
        .cl-btn { background: var(--accent); color: white; border: none; padding: 0 20px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .cl-list { display: flex; flex-direction: column; gap: 10px; }
        .cl-item { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
        .cl-item.done { opacity: 0.6; }
        .cl-item.done .cl-text { text-decoration: line-through; color: var(--text-sec); }
        .cl-checkbox { width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--text-sec); display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
        .cl-item.done .cl-checkbox { background: var(--accent); border-color: var(--accent); }
        .cl-item.done .cl-checkbox::after { content: "✓"; color: white; font-size: 14px; font-weight: bold; }
        .cl-text { flex: 1; font-size: 16px; word-break: break-word; cursor: pointer; }
        .cl-delete { background: rgba(255, 69, 58, 0.15); color: var(--accent-danger); border: none; width: 32px; height: 32px; border-radius: 8px; font-size: 18px; cursor: pointer; }

        /* СТИЛИ МОДУЛЯ ЗАЯВОК */
        #orders-container { display: none; width: 100%; flex-direction: column; gap: 20px; }
        .order-form { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 20px; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .order-form-title { font-size: 18px; font-weight: 600; margin: 0 0 5px 0; }
        .order-row { display: flex; gap: 10px; }
        .order-input { flex: 2; padding: 12px 14px; border-radius: 10px; border: 1px solid var(--border-color); background: var(--bg-base); color: white; font-size: 15px; outline: none; }
        .order-input.small { flex: 1; }
        .order-input:focus { border-color: var(--accent); }
        .btn-add-order { background: var(--accent-pf); color: black; border: none; padding: 12px; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 5px; }
        .btn-add-order:active { transform: scale(0.98); }
        .btn-send-now { background: rgba(255, 159, 10, 0.2); color: var(--accent-warning); border: 1px solid var(--accent-warning); padding: 14px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; transition: 0.2s;}
        .btn-send-now:active { background: var(--accent-warning); color: black; }
        
        .order-list { display: flex; flex-direction: column; gap: 10px; }
        .order-card { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 14px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border-color); }
        .order-info { display: flex; flex-direction: column; gap: 4px; flex: 1;}
        .order-title { font-size: 16px; font-weight: 600; }
        .order-meta { font-size: 13px; color: var(--text-sec); display: flex; gap: 8px; flex-wrap: wrap;}
        
        /* Модальное окно (Представьтесь) */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 1000; display: none; justify-content: center; align-items: center; }
        .modal-content { background: #1C1C1E; width: 90%; max-width: 320px; border-radius: 20px; padding: 24px; text-align: center; border: 1px solid var(--border-color); }
        .modal-title { font-size: 20px; font-weight: 600; margin-bottom: 15px; }
        .modal-input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border-color); background: black; color: white; font-size: 16px; margin-bottom: 15px; outline: none; text-align: center; }
        .modal-btn { background: var(--accent); color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

    <h1>Тугай ТТК</h1>
    
    <div class="controls">
        <div class="segment-control">
            <button id="btn-drinks" class="tab-btn active" onclick="switchTab('drinks')">Напитки</button>
            <button id="btn-pf" class="tab-btn" onclick="switchTab('pf')">ПФ</button>
            <button id="btn-checklist" class="tab-btn" onclick="switchTab('checklist')">Чек-лист</button>
            <button id="btn-orders" class="tab-btn" onclick="switchTab('orders')">Заявки</button>
        </div>
        
        <input type="text" id="search" class="search-bar" placeholder="Поиск (название, состав)..." onkeyup="filterCards()">
        
        <div class="filters" id="drink-filters">
            <div class="filter-pill active" onclick="setFilter('all', this)">Все</div>
            <div class="filter-pill" onclick="setFilter('cocktail', this)">Коктейли</div>
            <div class="filter-pill" onclick="setFilter('lemonade', this)">Лимонады</div>
            <div class="filter-pill" onclick="setFilter('smoothie', this)">Смузи</div>
            <div class="filter-pill" onclick="setFilter('nonalk', this)">Б/А</div>
            <div class="filter-pill" onclick="setFilter('tea_coffee', this)">Чай / Кофе</div>
        </div>
    </div>

    <div class="content-container">
        <!-- ТТК Контейнер -->
        <div class="grid" id="cards-container"></div>

        <!-- Чек-лист Контейнер -->
        <div id="checklist-container">
            <div class="cl-input-group">
                <input type="text" id="new-task" class="cl-input" placeholder="Добавить задачу..." onkeypress="handleTaskEnter(event)">
                <button class="cl-btn" onclick="addTask()">Плюс</button>
            </div>
            <div class="cl-list" id="task-list"></div>
        </div>

        <!-- Заявки Контейнер -->
        <div id="orders-container">
            <button class="btn-send-now" onclick="sendOrdersNow()">🚀 Отправить закупщику прямо сейчас</button>
            
            <div class="order-form">
                <h3 class="order-form-title">Добавить позицию</h3>
                <div class="order-row">
                    <input type="text" id="ord-name" class="order-input" placeholder="Название (напр. Мята)">
                    <input type="text" id="ord-qty" class="order-input small" placeholder="Кол-во (напр. 3 кг)">
                </div>
                <input type="text" id="ord-comment" class="order-input" placeholder="Комментарий (необязательно)">
                <button class="btn-add-order" onclick="submitOrder()">Добавить в общий список</button>
            </div>

            <div class="order-list" id="active-orders-list">
                <p style="color:var(--text-sec); text-align:center;">Загрузка заявок...</p>
            </div>
        </div>
    </div>

    <!-- Модальное окно авторизации для заявок -->
    <div class="modal-overlay" id="auth-modal">
        <div class="modal-content">
            <div class="modal-title">Вход (Раздел Заявки)</div>
            <input type="text" id="author-name-input" class="modal-input" placeholder="Ваше Имя (Бармен)">
            <input type="password" id="author-password-input" class="modal-input" placeholder="Пароль">
            <button class="modal-btn" onclick="saveAuthorName()">Войти</button>
        </div>
    </div>

        // ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ
        const API_BASE_URL = window.location.origin;

        let orderSyncInterval = null;

        // ==========================================
        // ЛОГИКА ВКЛАДОК (TABS) И КАРТОЧЕК
        // ==========================================
        function switchTab(tab) {
            currentTab = tab;
            
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${tab}`).classList.add('active');

            document.getElementById('cards-container').style.display = (tab === 'drinks' || tab === 'pf') ? 'grid' : 'none';
            document.getElementById('checklist-container').style.display = tab === 'checklist' ? 'flex' : 'none';
            document.getElementById('orders-container').style.display = tab === 'orders' ? 'flex' : 'none';
            
            document.getElementById('drink-filters').style.display = tab === 'drinks' ? 'flex' : 'none';
            document.getElementById('search').style.display = (tab === 'drinks' || tab === 'pf') ? 'block' : 'none';

            if (tab === 'drinks' || tab === 'pf') { renderCards(); } 
            else if (tab === 'orders') { checkAuthorAndLoadOrders(); } 
            else if (tab === 'checklist') { renderTasks(); }
        }

        function setFilter(filter, el) {
            currentFilter = filter;
            document.querySelectorAll('.filter-pill').forEach(btn => btn.classList.remove('active'));
            el.classList.add('active');
            renderCards();
        }

        function filterCards() { renderCards(); }
        function toggleCard(cardElement) { cardElement.classList.toggle('open'); }

        // Калькулятор для ПФ
        function recalculatePf(cardId, baseYield) {
            const input = document.getElementById(`calc-input-${cardId}`);
            let targetYield = parseFloat(input.value);
            
            if (isNaN(targetYield) || targetYield <= 0) {
                targetYield = baseYield; // Защита от кривого ввода
            }

            const ratio = targetYield / baseYield;
            
            // Находим все спаны с ингредиентами в этой карточке
            const ingredientSpans = document.querySelectorAll(`.ing-amount-${cardId}`);
            ingredientSpans.forEach(span => {
                const baseAmount = parseFloat(span.dataset.base);
                let newAmount = baseAmount * ratio;
                // Если число целое - оставляем как есть, если с плавающей точкой - округляем до 1 знака
                newAmount = Number.isInteger(newAmount) ? newAmount : newAmount.toFixed(1);
                span.innerText = newAmount;
            });
        }

        function renderCards() {
            const container = document.getElementById('cards-container');
            const searchText = document.getElementById('search').value.toLowerCase();
            
            container.innerHTML = ''; 

            const filteredData = ttkData.filter(item => {
                const matchesTab = item.tab === currentTab;
                const matchesCategory = currentTab === 'drinks' ? (currentFilter === 'all' || item.category === currentFilter) : true;
                
                // Поиск по названию или ингредиентам (учитывая оба формата данных)
                let searchString = item.title.toLowerCase();
                if (item.ingredients) { searchString += ' ' + item.ingredients.join(' ').toLowerCase(); }
                if (item.calcIngredients) { searchString += ' ' + item.calcIngredients.map(i => i.name).join(' ').toLowerCase(); }
                
                const matchesSearch = searchString.includes(searchText);
                return matchesTab && matchesCategory && matchesSearch;
            });

            if (filteredData.length === 0) {
                container.innerHTML = '<p style="color:var(--text-sec); text-align:center; width:100%;">Ничего не найдено</p>';
                return;
            }

            filteredData.forEach(item => {
                let tagsHtml = item.tags.map(t => `<span class="tag">${t}</span>`).join('');
                if (item.glass) tagsHtml += `<span class="tag glass">🍸 ${item.glass}</span>`;

                let innerContent = '';

                // ЕСЛИ ЭТО ПФ (Есть калькулятор)
                if (item.calcIngredients) {
                    const ingHtml = item.calcIngredients.map(ing => {
                        return `<li>${ing.name} — <span class="ing-val ing-amount-${item.id}" data-base="${ing.amount}">${ing.amount}</span> ${ing.unit}</li>`;
                    }).join('');

                    innerContent = `
                        <div class="pf-calculator" onclick="event.stopPropagation()">
                            <div class="pf-calc-label">Нужно получить:</div>
                            <input type="number" id="calc-input-${item.id}" class="pf-calc-input" value="${item.baseYield}" oninput="recalculatePf(${item.id}, ${item.baseYield})">
                            <div class="pf-calc-unit">${item.unit}</div>
                        </div>
                        <div class="method"><strong>Метод:</strong> ${item.method}</div>
                        <ul>${ingHtml}</ul>
                    `;
                } 
                // ЕСЛИ ЭТО ОБЫЧНЫЙ НАПИТОК
                else {
                    const ingHtml = item.ingredients.map(i => `<li>${i}</li>`).join('');
                    innerContent = `
                        <div class="tags">${tagsHtml}</div>
                        <div class="method"><strong>Метод:</strong> ${item.method}</div>
                        <ul>${ingHtml}</ul>
                    `;
                }

                const cardHtml = `
                    <div class="card" onclick="toggleCard(this)">
                        <div class="card-header">
                            <h3 class="card-title">${item.title}</h3>
                            <span class="chevron">▼</span>
                        </div>
                        <div class="card-content">
                            <div class="card-content-inner">
                                ${item.calcIngredients ? `<div class="tags">${tagsHtml}</div>` : ''}
                                ${innerContent}
                            </div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', cardHtml);
            });
        }

        // ==========================================
        // ЛОГИКА ЧЕК-ЛИСТА
        // ==========================================
        let tasks = JSON.parse(localStorage.getItem('tugai_tasks')) || [];
        function saveTasks() { localStorage.setItem('tugai_tasks', JSON.stringify(tasks)); }

        function renderTasks() {
            const list = document.getElementById('task-list');
            list.innerHTML = '';
            tasks.forEach((task, index) => {
                const item = document.createElement('div');
                item.className = `cl-item ${task.done ? 'done' : ''}`;
                item.innerHTML = `
                    <div class="cl-checkbox" onclick="toggleTask(${index})"></div>
                    <div class="cl-text" onclick="toggleTask(${index})">${task.text}</div>
                    <button class="cl-delete" onclick="deleteTask(${index})">✕</button>
                `;
                list.appendChild(item);
            });
        }
        function addTask() {
            const input = document.getElementById('new-task');
            if (input.value.trim()) { tasks.unshift({ text: input.value.trim(), done: false }); input.value = ''; saveTasks(); renderTasks(); }
        }
        function handleTaskEnter(event) { if (event.key === 'Enter') addTask(); }
        function toggleTask(index) { tasks[index].done = !tasks[index].done; saveTasks(); renderTasks(); }
        function deleteTask(index) { tasks.splice(index, 1); saveTasks(); renderTasks(); }

        // ==========================================
        // ЛОГИКА ЗАЯВОК И ПАРОЛЯ
        // ==========================================
        function getAuthorName() { return localStorage.getItem('tugai_author_name'); }

        function checkAuthorAndLoadOrders() {
            if (!getAuthorName()) {
                document.getElementById('auth-modal').style.display = 'flex';
            } else {
                fetchOrders();
                if (orderSyncInterval) clearInterval(orderSyncInterval);
                orderSyncInterval = setInterval(() => { if (currentTab === 'orders') fetchOrders(); }, 5000); 
            }
        }

        function saveAuthorName() {
            const nameInput = document.getElementById('author-name-input').value.trim();
            const passInput = document.getElementById('author-password-input').value.trim();
            if (nameInput.length < 2) { alert("Введите ваше имя"); return; }
            if (passInput !== "12345678") { alert("Неверный пароль!"); return; }
            localStorage.setItem('tugai_author_name', nameInput);
            document.getElementById('auth-modal').style.display = 'none';
            checkAuthorAndLoadOrders();
        }

        async function fetchOrders() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/get_orders`);
                const orders = await response.json();
                const listEl = document.getElementById('active-orders-list');
                
                if (orders.length === 0) {
                    listEl.innerHTML = '<p style="color:var(--text-sec); text-align:center; margin-top:20px;">Список заявок пуст.</p>';
                    return;
                }
                listEl.innerHTML = '';
                orders.forEach(ord => {
                    const commentHtml = ord.comment ? `<span style="color:#FF9F0A;">💬 ${ord.comment}</span>` : '';
                    listEl.insertAdjacentHTML('beforeend', `
                        <div class="order-card">
                            <div class="order-info">
                                <div class="order-title">${ord.item_name} <span style="color:var(--accent-pf); font-weight:bold;">— ${ord.quantity}</span></div>
                                <div class="order-meta">${commentHtml}</div>
                            </div>
                            <button class="cl-delete" onclick="removeOrder(${ord.id})">✕</button>
                        </div>
                    `);
                });
            } catch (error) { console.error(error); }
        }

        async function submitOrder() {
            const nameEl = document.getElementById('ord-name');
            const qtyEl = document.getElementById('ord-qty');
            const commEl = document.getElementById('ord-comment');
            if (!nameEl.value.trim() || !qtyEl.value.trim()) { alert("Название и количество обязательны!"); return; }
            
            const btn = document.querySelector('.btn-add-order');
            btn.innerText = "⏳..."; btn.disabled = true;

            try {
                const res = await fetch(`${API_BASE_URL}/api/add_order`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ item_name: nameEl.value.trim(), quantity: qtyEl.value.trim(), comment: commEl.value.trim(), author_name: getAuthorName() })
                });
                if (res.ok) { nameEl.value = ''; qtyEl.value = ''; commEl.value = ''; fetchOrders(); }
            } catch (e) { alert("Нет связи с сервером"); } 
            finally { btn.innerText = "Добавить в общий список"; btn.disabled = false; }
        }

        async function removeOrder(id) {
            if(!confirm("Удалить эту позицию?")) return;
            try { await fetch(`${API_BASE_URL}/api/delete_order/${id}`, { method: 'DELETE' }); fetchOrders(); } catch (e) {}
        }

        async function sendOrdersNow() {
            if(!confirm("Отправить список закупщику в Телеграм прямо сейчас и очистить базу?")) return;
            const btn = document.querySelector('.btn-send-now');
            btn.innerText = "⏳ Отправка..."; btn.disabled = true;
            try {
                const res = await fetch(`${API_BASE_URL}/api/send_now`, { method: 'POST' });
                if (res.ok) { alert("✅ Успешно отправлено в Telegram!"); fetchOrders(); }
            } catch (e) {} finally { btn.innerHTML = "🚀 Отправить закупщику прямо сейчас"; btn.disabled = false; }
        }

        window.onload = () => { renderCards(); };
    </script>
